spring.config.import=optional:file:.env[.properties]
spring.application.name=ticket-consumer-service
spring.profiles.default=local
spring.datasource.url=${SPRING_DATASOURCE_URL:${DATABASE_URL:jdbc:h2:mem:ticketdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${DATABASE_USERNAME:sa}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${DATABASE_PASSWORD:}}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
spring.jpa.open-in-view=false

app.aws.region=${AWS_REGION:us-east-1}
app.aws.access-key-id=${APP_AWS_ACCESS_KEY_ID:${AWS_ACCESS_KEY_ID:}}
app.aws.secret-access-key=${APP_AWS_SECRET_ACCESS_KEY:${AWS_SECRET_ACCESS_KEY:}}
app.aws.session-token=${APP_AWS_SESSION_TOKEN:${AWS_SESSION_TOKEN:}}
app.aws.endpoint=${APP_AWS_ENDPOINT:}
app.ticket.queue.url=${TICKET_QUEUE_URL:}
app.ticket.queue.max-messages=${TICKET_QUEUE_MAX_MESSAGES:10}
app.ticket.queue.wait-time-seconds=${TICKET_QUEUE_WAIT_TIME_SECONDS:1}
